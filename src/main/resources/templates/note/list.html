<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{layout :: head}"></div>
</head>
<body>
<div th:replace="~{layout :: nav}"></div>
<div class="container mt-4">
    <h1>Notes</h1>
    
    <form th:action="@{/notes}" method="post" class="mb-4">
        <div class="row">
            <div class="col-md-3">
                <select name="candidat" class="form-select" required>
                    <option value="">Sélectionner Candidat</option>
                    <option th:each="c : ${candidats}" th:value="${c.id}" th:text="${c.nom}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <select name="matiere" class="form-select" required>
                    <option value="">Sélectionner Matiere</option>
                    <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <select name="correcteur" class="form-select" required>
                    <option value="">Correcteur</option>
                    <option th:each="cr : ${correcteurs}" th:value="${cr.id}" th:text="${cr.nom}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" step="0.01" name="note" class="form-control" placeholder="Note" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary">Ajouter</button>
            </div>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Candidat</th>
            <th>Matière</th>
            <th>Correcteur</th>
            <th>Note</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="el : ${elements}">
            <td th:text="${el.id}"></td>
            <td th:text="${el.candidat.nom}"></td>
            <td th:text="${el.matiere.nom}"></td>
            <td th:text="${el.correcteur.nom}"></td>
            <td th:text="${el.note}"></td>
            <td>
                <a th:href="@{/notes/delete/{id}(id=${el.id})}" class="btn btn-danger btn-sm">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
