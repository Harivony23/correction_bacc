<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{layout :: head}"></div>
</head>
<body>
<div th:replace="~{layout :: nav}"></div>
<div class="container mt-4">
    <h1>Matières</h1>
    
    <form th:action="@{/matieres}" method="post" class="mb-4">
        <div class="row">
            <div class="col-md-4">
                <input type="text" name="nom" class="form-control" placeholder="Nom de la matière" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary">Ajouter</button>
            </div>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="el : ${elements}">
            <td th:text="${el.id}"></td>
            <td th:text="${el.nom}"></td>
            <td>
                <a th:href="@{/matieres/delete/{id}(id=${el.id})}" class="btn btn-danger btn-sm">Supprimer</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
